<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
  </head>
  <body data-stream-url="{{ stream_url if stream_url is defined else '' }}">
    <header class="shell-header">
      <div>
        <a class="brand" href="/traces">Trace WebUI</a>
        <p class="subtle">本机只读追踪观察台</p>
      </div>
    </header>
    <main class="shell-main">
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='app.js') }}" defer></script>
  </body>
  </html>
